<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="vendeur.css">
  <title>Dashboard Vendeur</title>
</head>

<body class="bg-gray-100">

  <div class="flex h-screen">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-xl flex flex-col
    transform -translate-x-full md:translate-x-0 transition duration-300 z-30">

      <!-- HEADER SIDEBAR -->
      <div class="p-6 border-b flex items-center gap-3">

        <div
          class="w-10 h-10 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18" />
          </svg>
        </div>

        <h1 class="text-xl font-bold text-gray-800">Vendeur</h1>

      </div>

      <nav class="flex-1 p-5 space-y-2">

        <a href="./dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
          </svg>


          Dashboard
        </a>

        <a href="./vendeur.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>

          Ajouter produit
        </a>

        <a href="./liste.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25M9 16.5v.75m3-3v3M15 12v5.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>


          Liste produits
        </a>

        <a href="./gestion.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M14.25 7.756a4.5 4.5 0 1 0 0 8.488M7.5 10.5h5.25m-5.25 3h5.25M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>


          Gestion ventes
        </a>

      </nav>

    </aside>

    <!-- Overlay mobile -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-20 md:hidden"></div>

    <!-- Main content -->
    <div class="flex-1 flex flex-col md:ml-64">

      <!-- Navbar -->
      <header class="flex justify-between items-center bg-white shadow-sm h-16 px-6">

        <!-- LEFT : Hamburger mobile -->
        <div class="flex items-center gap-3">

          <button id="openSidebar" class="md:hidden text-gray-600 hover:text-purple-600 transition">

            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>

          </button>

          <h2 class="text-lg font-bold text-gray-800 md:hidden">
            Vendeur
          </h2>

        </div>

        <!-- RIGHT : Logout -->
        <div class="ml-auto">

          <button id="logoutBtn" class="flex items-center gap-2 bg-red-600 text-white px-5 py-2.5 rounded-xl
        hover:bg-red-700 transition shadow-sm">

            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 24 24">

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 17l5-5-5-5M21 12H9" />

            </svg>

            Déconnecter
          </button>

        </div>

      </header>

      <main class="flex-1 p-6 overflow-auto">

        <!-- TITLE -->
        <div class="flex items-center gap-3 mb-8">
          <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 3h6v6H3V3zm12 0h6v10h-6V3zM3 15h6v6H3v-6zm12 4v-6h6v6h-6z" />
          </svg>

          <h2 class="text-3xl font-bold text-gray-800">
            Tableau de bord vendeur
          </h2>
        </div>

        <!-- DASHBOARD CARDS -->
        <section id="dashboard" class="mb-10">

          <div class="grid md:grid-cols-3 gap-8">

            <!-- PRODUITS -->
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100 hover:shadow-xl transition">
              <div class="flex justify-between items-center">
                <div>
                  <p class="text-gray-500 text-sm uppercase">Produits</p>
                  <p id="totalProducts" class="text-4xl font-bold text-purple-600 mt-2">0</p>
                </div>

                <div class="bg-purple-100 p-4 rounded-xl">
                  <div class="bg-purple-100 p-4 rounded-xl">
                    <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20 13V7a2 2 0 00-2-2H6a2 2 0 00-2 2v6m16 0v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6m16 0H4" />
                    </svg>
                  </div>
                </div>
              </div>
            </div>

            <!-- VENTES -->
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100 hover:shadow-xl transition">
              <div class="flex justify-between items-center">
                <div>
                  <p class="text-gray-500 text-sm uppercase">Ventes</p>
                  <p id="totalSales" class="text-4xl font-bold text-green-600 mt-2">0</p>
                </div>

                <div class="bg-green-100 p-4 rounded-xl">
                  <div class="bg-green-100 p-4 rounded-xl">
                    <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                      stroke-width="2">

                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 8c-1.657 0-3 1.343-3 3v2a3 3 0 006 0v-2c0-1.657-1.343-3-3-3z" />

                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 13h3l3 6 4-12 3 6h4" />

                    </svg>
                  </div>
                </div>
              </div>
            </div>

            <!-- REVENU -->
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100 hover:shadow-xl transition">
              <div class="flex justify-between items-center">
                <div>
                  <p class="text-gray-500 text-sm uppercase">Revenu total</p>
                  <p id="totalRevenue" class="text-3xl font-bold text-pink-600 mt-2">
                    0 FCFA
                  </p>
                </div>

                <div class="bg-pink-100 p-4 rounded-xl">
                  <div class="bg-pink-100 p-4 rounded-xl">
                    <svg class="w-6 h-6 text-pink-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                    </svg>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </section>

        <!-- FORM CARD MODERNE -->
        <section class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">

          <h2 class="text-2xl font-bold mb-6 text-gray-800 flex items-center gap-3">

            <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">

              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />

            </svg>

            Ajouter un produit
          </h2>

          <form id="productForm" class="space-y-5">

            <input type="text" id="name" placeholder="Nom du produit"
              class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-400 outline-none">

            <textarea id="description" placeholder="Description du produit"
              class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-400 outline-none"></textarea>

            <select id="category"
              class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-400 outline-none">

              <option value="">Choisir une catégorie</option>
              <option value="Chaussure">Chaussure</option>
              <option value="Habits">Habits</option>
              <option value="Accessoires">Accessoires</option>
              <option value="Electronique">Electronique</option>

            </select>

            <input type="number" id="price" placeholder="Prix"
              class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-400 outline-none">

            <input type="file" id="image" accept="image/*" class="w-full p-4 border rounded-xl">

            <button type="submit"
              class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 rounded-xl font-semibold hover:opacity-90 transition">
              Ajouter le produit
            </button>

          </form>

        </section>

      </main>
    </div>
  </div>

  <script src="./vendeur.js"></script>
</body>

</html>
