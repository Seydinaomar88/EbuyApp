<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- SIDEBAR -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-xl flex flex-col
    transform -translate-x-full md:translate-x-0 transition duration-300 z-30">

      <!-- HEADER SIDEBAR -->
      <div class="p-6 border-b flex items-center gap-3">

        <div
          class="w-10 h-10 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18" />
          </svg>
        </div>

        <h1 class="text-xl font-bold text-gray-800">Vendeur</h1>

      </div>

      <nav class="flex-1 p-5 space-y-2">

        <a href="./dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
          </svg>


          Dashboard
        </a>

        <a href="./vendeur.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>

          Ajouter produit
        </a>

        <a href="./liste.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25M9 16.5v.75m3-3v3M15 12v5.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>


          Liste produits
        </a>

        <a href="./gestion.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M14.25 7.756a4.5 4.5 0 1 0 0 8.488M7.5 10.5h5.25m-5.25 3h5.25M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>


          Gestion ventes
        </a>

      </nav>

    </aside>

        <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-20 md:hidden"></div>

        <!-- MAIN -->
        <div class="flex-1 flex flex-col md:ml-64">

            <header class="flex justify-between items-center bg-white shadow-sm h-16 px-6">

                <button id="openSidebar" class="md:hidden text-gray-600 hover:text-purple-600 transition">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

                <div class="ml-auto flex items-center gap-4">
                    <button id="logoutBtn"
                        class="flex items-center gap-2 bg-red-600 text-white px-5 py-2.5 rounded-xl hover:bg-red-700 transition shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 17l5-5-5-5M21 12H9" />
                        </svg>
                        Déconnecter
                    </button>
                </div>

            </header>

            <main class="p-6 overflow-auto">

                <h2 class="text-3xl font-bold mb-8 flex items-center gap-3 text-gray-800">
                    <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 3h6v6H3V3zm12 0h6v10h-6V3zM3 15h6v6H3v-6zm12 4v-6h6v6h-6z" />
                    </svg>
                    Dashboard Analytics
                </h2>

                <div class="grid md:grid-cols-2 gap-8">

                    <div class="bg-white p-6 rounded-2xl shadow border border-gray-100">
                        <h3 class="font-semibold mb-4">Ventes par mois</h3>
                        <canvas id="salesChart"></canvas>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow border border-gray-100">
                        <h3 class="font-semibold mb-4">Produits vs Ventes</h3>
                        <canvas id="productChart"></canvas>
                    </div>

                </div>

            </main>

        </div>
    </div>

    <script>
        // Sidebar mobile
        const sidebar = document.getElementById("sidebar");
        document.getElementById("openSidebar")?.addEventListener("click", () => {
            sidebar.classList.remove("-translate-x-full");
            document.getElementById("overlay")?.classList.remove("hidden");
        });

        document.getElementById("overlay")?.addEventListener("click", () => {
            sidebar.classList.add("-translate-x-full");
            document.getElementById("overlay")?.classList.add("hidden");
        });

        // Logout
        const logoutBtn = document.getElementById("logoutBtn");
        logoutBtn?.addEventListener("click", () => {
            localStorage.removeItem("connectedUser");
            window.location.href = "../index.html";
        });

        // Charts
        function loadCharts() {
            const sales = JSON.parse(localStorage.getItem("sales") || "[]");

            // Group sales by month
            const months = {};
            sales.forEach(s => {
                const d = new Date(s.date);
                const key = d.getFullYear() + "-" + (d.getMonth() + 1);
                months[key] = (months[key] || 0) + Number(s.total || 0);
            });

            const labels = Object.keys(months);
            const data = Object.values(months);

            new Chart(document.getElementById('salesChart'), {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'Ventes FCFA', data: data, fill: true }] }
            });

            const products = JSON.parse(localStorage.getItem("products") || "[]");

            new Chart(document.getElementById('productChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Produits', 'Ventes'],
                    datasets: [{ data: [products.length, sales.length] }]
                }
            });
        }

        document.addEventListener("DOMContentLoaded", loadCharts);
    </script>

</body>

</html>
