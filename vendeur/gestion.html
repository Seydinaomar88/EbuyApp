<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Gestion des ventes</title>
</head>

<body class="bg-gray-100">

  <div class="flex h-screen">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-xl flex flex-col
    transform -translate-x-full md:translate-x-0 transition duration-300 z-30">

      <!-- HEADER SIDEBAR -->
      <div class="p-6 border-b flex items-center gap-3">

        <div
          class="w-10 h-10 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18" />
          </svg>
        </div>

        <h1 class="text-xl font-bold text-gray-800">Vendeur</h1>

      </div>

      <nav class="flex-1 p-5 space-y-2">

        <a href="./dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
          </svg>


          Dashboard
        </a>

        <a href="./vendeur.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>

          Ajouter produit
        </a>

        <a href="./liste.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25M9 16.5v.75m3-3v3M15 12v5.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>


          Liste produits
        </a>

        <a href="./gestion.html" class="flex items-center gap-3 px-4 py-3 rounded-xl
        hover:bg-purple-50 text-gray-700 hover:text-purple-600 transition">

          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M14.25 7.756a4.5 4.5 0 1 0 0 8.488M7.5 10.5h5.25m-5.25 3h5.25M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>


          Gestion ventes
        </a>

      </nav>

    </aside>

    <!-- Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-20 md:hidden"></div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col md:ml-64">

      <header class="flex justify-between items-center bg-white shadow-sm h-16 px-6">

        <!-- LEFT : Hamburger mobile -->
        <div class="flex items-center gap-3">

          <button id="openSidebar" class="md:hidden text-gray-600 hover:text-purple-600 transition">

            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>

          </button>

          <h2 class="text-lg font-bold text-gray-800 md:hidden">
            Vendeur
          </h2>

        </div>

        <!-- RIGHT : Logout -->
        <div class="ml-auto">

          <button id="logoutBtn" class="flex items-center gap-2 bg-red-600 text-white px-5 py-2.5 rounded-xl
        hover:bg-red-700 transition shadow-sm">

            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 24 24">

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 17l5-5-5-5M21 12H9" />

            </svg>

            Déconnecter
          </button>

        </div>

      </header>

      <main class="flex-1 p-6 overflow-auto">

        <!-- TITLE -->
        <div class="flex items-center gap-3 mb-8">

          <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">

            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 3h6v6H3V3zm12 0h6v10h-6V3zM3 15h6v6H3v-6zm12 4v-6h6v6h-6z" />
          </svg>

          <h2 class="text-3xl font-bold text-gray-800">
            Gestion des ventes
          </h2>

        </div>

        <!-- CARD -->
        <section class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">

          <div class="overflow-x-auto">

            <table class="w-full border-collapse">

              <thead class="bg-purple-100 text-purple-900">
                <tr>
                  <th class="p-4 text-left">ID</th>
                  <th class="p-4 text-left">Date & Heure</th>
                  <th class="p-4 text-left">Articles</th>
                  <th class="p-4 text-left">Total</th>
                  <th class="p-4 text-center">Actions</th>
                </tr>
              </thead>

              <tbody id="salesTableBody" class="divide-y divide-gray-100 bg-white">
              </tbody>

            </table>

          </div>

          <div class="mt-6 flex justify-center gap-2" id="pagination"></div>

        </section>

      </main>
    </div>
  </div>

  <script src="./gestion.js"></script>

</body>

</html>
